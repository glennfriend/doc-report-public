    <title>她以為只是亂經，但其實已經癌症第二期</title>

  <body>
    <main class="page" data-youtube-sync-app></main>

    <script>
      window.YOUTUBE_SYNC_CONFIG = {
        title: "婦科權威：她以為只是亂經，但其實已經癌症第二期...｜【初日會客室】鄭丞傑 醫師",
        updatedAt: "2026-05-21",
        videoUrl: "https://www.youtube.com/watch?v=awuififw5xU",
        videoId: "awuififw5xU",
        tags: ["婦科", "更年前期", "子宮內膜癌", "子宮切除", "生育保健"],
        summary: "這篇意圖在講 35 歲後女性的更年前期變化，子宮內膜癌的明確警訊，子宮切除的長期風險，以及可執行的就醫與保健原則",
        timeline: [
          { time: "00:00", seconds: 0, text: "台灣婦女最近 20 年增加最多的癌症，醫師點名是乳癌與子宮內膜癌。他提醒停經後不是沒有癌症風險，子宮內膜癌與卵巢癌在停經後都增加" },
          { time: "01:35", seconds: 95, text: "更年前期是從有生育能力過渡到沒有生育能力的過程，約有 15 年。多數人約 35 歲開始，有些人 38 到 40 歲開始，也有人 30 出頭就開始" },
          { time: "01:59", seconds: 119, text: "更年前期的明確變化包括：月經週期從 28 天變 27 天，經期從 5 天變 4 天，衛生棉使用量減少，月經前微量出血，月經後拖拖拉拉出血。若超音波沒有息肉、肌瘤、內膜增生等問題，醫師會先考慮荷爾蒙開始不穩定" },
          { time: "04:08", seconds: 248, text: "35 到 40 歲後常見小腹變大，醫師列出 3 個原因：雌激素下降造成脂肪重分配，年齡增長造成代謝率下降，胰島素敏感度下降使熱量更容易囤積" },
          { time: "04:36", seconds: 276, text: "醫師門診觀察：有警覺性的人較早檢查，反而比較不容易拖到癌症。缺乏警覺性的人較容易忽略異常變化" },
          { time: "04:56", seconds: 296, text: "尚未真正停經前，醫師不贊成自行補充荷爾蒙，因為可能讓卵巢加速萎縮。他建議先從食物補充，例如山藥、豆漿、豆渣、苜蓿芽。其中豆渣的植物性荷爾蒙含量比豆漿更高" },
          { time: "05:34", seconds: 334, text: "若本身有子宮肌瘤、子宮肌腺症、子宮內膜異位症，植物性荷爾蒙保健品未必適合。醫師傾向先用食物，因為相對安全。西藥、中藥、蜂王乳、胎盤素等作用較強，不適合自行補充" },
          { time: "06:23", seconds: 383, text: "醫師強調判斷更年前期不能只看化驗數值，症狀比單次數值更重要。所謂正常值只是多數人的落點，不等於個人的正常值" },
          { time: "06:41", seconds: 401, text: "FSH 與 LH 可作為卵巢老化參考。醫師臨床判讀是：FSH 小於 10 常見於年輕族群，10 到 20 代表卵巢正在老化，20 到 40 代表接近更年期，40 以上很多人已停經" },
          { time: "07:13", seconds: 433, text: "AMH（卵子庫存量）不受月經週期影響，什麼時間抽都可參考。常見正常範圍約 2 到 5 或 2 到 6。若 35 歲只剩 1 點多或 0 點多，代表卵子庫存明顯不足。若只剩 0.0 幾，臨床上會視為非常接近最後機會" },
          { time: "08:17", seconds: 497, text: "雌二醇 E2 的數值受排卵期影響很大，有些醫院範圍訂為 35 到 350。但若低到 20 以下，臨床上通常會追查是否卵巢功能低下、已進入更年期，或受到藥物抑制" },
          { time: "08:39", seconds: 519, text: "台灣婦女最近 20 年增加明顯的癌症之一就是子宮內膜癌。醫師強調最重要的警訊是異常出血，不能只當成亂經" },
          { time: "08:57", seconds: 537, text: "停經後出血最常見原因是子宮內膜萎縮，約占 6 成。但其中約 10 分之 1 是子宮內膜癌，所以停經後出血一定要檢查" },
          { time: "09:17", seconds: 557, text: "子宮內膜癌不只發生在停經後。約一半病例發生在停經前，部分在更年期，台灣約 10% 發生在 40 歲以前，歐美約 5%。明確案例：1 名 27 歲女性因月經拖拖拉拉與微量出血就醫，息肉切除送驗後確診子宮內膜癌。原醫師建議切除子宮，鄭醫師認為她 27 歲且尚未生育不應直接切除。該個案為第 1 期 A，細胞分化良好，改用黃體素治療 6 個月後再次刮除檢查已恢復正常。醫師之後建議她儘快懷孕，因為懷孕期間長期黃體素可抑制復發" },
          { time: "10:19", seconds: 619, text: "子宮內膜癌大幅增加的兩個主要因素是肥胖與未生育。若 40 到 50 多歲女性，體型偏胖，出血量大，且從未生育，除了子宮肌瘤等良性病變，也必須優先想到子宮內膜癌" },
          { time: "10:50", seconds: 650, text: "子宮內膜癌的出血型態包括：停經後出血、非經期出血、月經亂到異常、出血量突然變大、或持續微量出血。即使只是看似普通的息肉合併少量出血，也可能是癌症" },
          { time: "11:13", seconds: 673, text: "停經後異常出血通常較容易讓病人就醫，因此多數子宮內膜癌可在第 1 期 A 被發現。真正容易被延誤的是更年期女性，因為她們常把異常出血誤認為只是亂經" },
          { time: "11:30", seconds: 690, text: "明確案例：醫師碰過好幾位 45 到 50 歲女性，以為自己只是更年期亂經，甚至已看過好幾個醫生，仍未被懷疑是內膜癌。等到轉來找他時，已經是第 2 期" },
          { time: "12:03", seconds: 723, text: "醫師累積手術量約 26000 台，其中子宮切除超過 5000 台。早年主流觀念認為子宮切除是對良性疾病一勞永逸的處理方式" },
          { time: "12:51", seconds: 771, text: "醫師後來依臨床經驗與文獻改變看法。結論是：即使保留卵巢，單做子宮切除仍可能使更年期提早至少 2 年，平均提早 2 到 3 年" },
          { time: "13:11", seconds: 791, text: "另有研究指出，子宮切除但未切除卵巢者，術後 4 年卵巢衰竭機率比未切除子宮者暴增 1 倍以上。醫師推論與子宮與卵巢間血液供應被切斷有關" },
          { time: "13:50", seconds: 830, text: "子宮切除但保留卵巢的女性，後續高血壓、高血脂、糖尿病、中風、憂鬱症、骨質疏鬆症的發生率都上升。這些病人多半去看內科或心血管科，婦科端容易忽略與子宮切除的關聯" },
          { time: "14:18", seconds: 858, text: "醫師因此反對把良性婦科疾病一律導向子宮切除。子宮肌瘤、子宮肌腺症、子宮內膜異位等疾病多數在停經後不再是原本的問題，不應過早用切除器官的方式處理" },
          { time: "14:42", seconds: 882, text: "子宮切除後即使卵巢仍保留，也有數據顯示 FSH 上升、AMH 下降，代表卵巢功能受影響" },
          { time: "15:23", seconds: 923, text: "醫師的治療原則是先非侵襲、後侵襲。若喝水、睡覺可改善就不要吃藥，吃藥可改善就不要打針，打針可改善就不要開刀，能保留器官就盡量保留" },
          { time: "16:33", seconds: 993, text: "對 35 歲後的更年前期，醫師給出 3 個可執行建議：接受老化正在發生，規律做有效運動（有氧與重量訓練），從食物補充植物性荷爾蒙，不要先靠高劑量保健品" },
          { time: "17:00", seconds: 1020, text: "醫師用劑量對比說明食物相對安全：1 顆保健品約有 60 毫克植物性荷爾蒙，若要靠豆漿攝取到同樣量，一天要喝 1 萬多 cc。真正需要小心的是高劑量保健品，不是日常食物" },
          { time: "17:26", seconds: 1046, text: "若身體變化持續 2 到 3 個月且與以往不同，就應就醫判斷是正常老化還是異常病變，不要自行假設只是更年期" },
          { time: "17:54", seconds: 1074, text: "在健康風險上，醫師明確表示生育對女性健康整體是利多於弊。內膜癌、卵巢癌、乳癌都與未生育有相關性" },
          { time: "18:12", seconds: 1092, text: "醫師認為更年期平均年齡延後，與營養保健與文明進步有關。他剛當醫師的 40 年前，平均更年期年齡約 47 歲" },
          { time: "18:42", seconds: 1122, text: "提高卵子品質的具體做法包括：正常作息、不抽菸、足夠且適當的運動、補充肌醇、維他命 B 群、維他命 D3、維他命 E" },
          { time: "19:11", seconds: 1151, text: "安全期若方法正確，可用於避孕也可用於求孕。多數人失敗的原因是計算不精確，但現在有 APP 可提高準確度" },
          { time: "19:38", seconds: 1178, text: "備孕有必要。葉酸若在懷孕前 2 到 3 個月開始補充，並持續到懷孕初期，可降低胎兒神經管缺陷風險" },
          { time: "19:56", seconds: 1196, text: "備孕不只女性要做，男性也要一起改善生活型態。戒菸、戒酒、調整作息後，懷孕率會提高，卵子與精蟲品質也會更好" },
          { time: "20:26", seconds: 1226, text: "體重與備孕直接相關。過瘦會讓月經週期混亂、排卵異常，BMI 18.5 到 24 不是隨意訂定，若 BMI 已到 27 以上荷爾蒙常已明顯混亂。保健方向包括私密處益生菌與偏植物性荷爾蒙產品，但不要亂吃鹿胎盤、胎盤素、蜂王乳等高濃度產品，有些人長期食用後與子宮內膜癌增加有關" },
          { time: "21:45", seconds: 1305, text: "醫師點名年輕女性最常見且最不應忽視的不良習慣是抽菸與酗酒。菸酒會傷害健康，也會傷害生育能力，且都已被聯合國列為致癌物質" }
        ],
        keyPoints: [
          {
            title: "1. 更年前期不是模糊感受，而是有明確身體變化",
            items: [
              "35 歲後月經週期縮短、經期變短、經量變少、月經前後微量出血、小腹變大、睡眠與情緒變差，都可能是更年前期的實際變化",
              "醫師判斷時不只看單次抽血數值，更重視症狀是否持續、是否與以往不同"
            ]
          },
          {
            title: "2. 子宮內膜癌最容易被忽略的情境是把異常出血當成亂經",
            items: [
              "停經後出血一定要檢查，因為最常見雖然是內膜萎縮，但約 10 分之 1 是子宮內膜癌",
              "更年期女性更容易延誤診斷，因為會把不正常出血誤認為只是亂經或快停經",
              "子宮內膜癌不是只有停經後才會發生，約一半病例發生在停經前，台灣約 10% 發生在 40 歲以前"
            ]
          },
          {
            title: "3. 影片中有 2 類明確延誤或誤判案例",
            items: [
              "27 歲女性原本只被當成子宮內膜息肉，但送驗後確診子宮內膜癌第 1 期 A。她沒有直接切除子宮，改用黃體素治療 6 個月後恢復正常",
              "多位 45 到 50 歲女性把異常出血當成更年期亂經，也看過多位醫師，直到轉診時已經是第 2 期"
            ]
          },
          {
            title: "4. 子宮切除對良性疾病未必是低代價方案",
            items: [
              "即使保留卵巢，子宮切除仍可能讓更年期提早至少 2 年，平均提早 2 到 3 年",
              "術後 4 年卵巢衰竭風險可增加 1 倍以上，且高血壓、高血脂、糖尿病、中風、憂鬱症、骨質疏鬆症風險都上升",
              "因此對子宮肌瘤、子宮肌腺症、子宮內膜異位等良性疾病，醫師主張能保守就先保守"
            ]
          },
          {
            title: "5. 可執行的保健與就醫原則很明確",
            items: [
              "規律做有效運動，包括有氧與重量訓練",
              "維持正常作息，不抽菸，不酗酒",
              "先從食物補充植物性荷爾蒙，例如山藥、豆漿、豆渣、苜蓿芽，不先靠高劑量保健品",
              "體重維持在合理範圍，備孕時特別注意 BMI 18.5 到 24",
              "若異常變化持續 2 到 3 個月且與過去不同，就要就醫，不要自行當成正常老化"
            ]
          }
        ]
      };
